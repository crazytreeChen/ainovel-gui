name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'
      - run: npm ci
      - run: npx eslint src/ electron/ --ext .ts,.tsx --max-warnings 0
        continue-on-error: true

  typecheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'
      - run: npm ci
      - name: TypeScript src/
        run: npx tsc --noEmit -p tsconfig.json
      - name: TypeScript electron/
        run: npx tsc --noEmit -p electron/tsconfig.json

  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'
      - run: npm ci
      - run: npx vitest run
        continue-on-error: true

  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'
      # 安装Go 1.21 国内加速
      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        env:
          GOPROXY: https://goproxy.cn,direct
        with:
          go-version: '1.21'
          cache: true
      # 全局注入Go环境变量，全步骤生效
      - name: Export Go PATH & Verify
        run: |
          echo "GOROOT=$GOROOT" >> $GITHUB_ENV
          echo "PATH=$GOROOT/bin:$PATH" >> $GITHUB_ENV
          go version
      - run: npm ci
      - run: npm run build