name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            runner: macos-latest
            target: mac
          - platform: windows
            runner: windows-latest
            target: win

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive # 递归拉取ainovel-cli子模块源码

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Setup Go 1.21
        uses: actions/setup-go@v5
        env:
          GOPROXY: https://goproxy.cn,direct
        with:
          go-version: '1.21'
          cache: true

      # 全局注入Go PATH，解决macOS后续步骤找不到go命令
      - name: Inject Go PATH & Check Version
        run: |
          echo "GOROOT=$GOROOT" >> $GITHUB_ENV
          echo "PATH=$GOROOT/bin:$PATH" >> $GITHUB_ENV
          go version

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build ainovel-cli binary
        run: npm run build:cli

      - name: Build renderer & electron
        run: npm run build

      - name: Build ${{ matrix.platform }}
        run: npx electron-builder --${{ matrix.target }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-artifacts
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
          retention-days: 7

  publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: 'npm'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Move artifacts to release/
        run: |
          mkdir -p release
          cp artifacts/*/* release/ 2>/dev/null || true

      - name: Generate release notes from download.json
        id: notes
        run: |
          node -e "
            const dd = require('./download.json');
            console.log(dd.release_notes || '');
          " > release-notes.md
          echo "notes=$(cat release-notes.md)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AINovel ${{ github.ref_name }}
          body_path: release-notes.md
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-' ) }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated download.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download.json
          git commit -m "chore: 更新 download.json for ${{ github.ref_name }}" || true
          git push